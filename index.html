<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Lista de precios</title>
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#134e4a">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
:root {
  --bg:#f4f6f8; --card:#ffffff; --ink:#111827; --muted:#6b7280; --line:#e5e7eb;
  --brand:#0f766e; --brand2:#134e4a; --warn:#f59e0b; --danger:#dc2626; --good:#16a34a;
  --shadow:0 4px 16px rgba(15,23,42,.08); --radius:18px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:Arial, Helvetica, sans-serif;font-size:17px;}
button,input,select{font:inherit}
.header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#ffffff 0%,#ffffff 88%,rgba(255,255,255,.92));padding:6px 8px 6px;border-bottom:1px solid var(--line);box-shadow:0 2px 10px rgba(0,0,0,.05)}
.title{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px}
.title h1{font-size:19px;line-height:1;margin:0;font-weight:900;color:var(--brand2)}
.logoMini{width:42px;height:42px;object-fit:cover;border-radius:999px;border:1px solid #99f6e4;background:#fff;padding:2px;box-shadow:var(--shadow)}
.searchrow{display:flex;gap:6px;align-items:center}
.searchbox{position:relative;flex:1}
.searchbox span{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:24px;color:var(--brand)}
#q{width:100%;height:46px;border:2px solid var(--brand);border-radius:15px;background:#fff;padding:0 10px 0 42px;font-size:20px;font-weight:900;outline:none;box-shadow:var(--shadow)}
#q::placeholder{font-size:15px;font-weight:700;color:#9ca3af}
.iconbtn{height:46px;min-width:50px;border:0;border-radius:15px;background:var(--brand);color:#fff;font-size:23px;font-weight:900;box-shadow:var(--shadow)}
.filterBar{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(0,1fr) auto auto;gap:5px;margin-top:6px;align-items:center}
.filterBar select,.smallbtn{height:34px;border-radius:12px;border:1px solid var(--line);background:#fff;padding:0 7px;color:#111827;font-size:13px;font-weight:900;white-space:nowrap}
.filterBar select{min-width:0;width:100%}
.adminTools{display:none;gap:5px;overflow:auto;padding-top:5px}
.admin .adminTools{display:flex}
.smallbtn{min-width:max-content;padding:0 10px}
.smallbtn.primary{background:#111827;color:#fff}
.smallbtn.danger{background:#fee2e2;color:#991b1b;border-color:#fecaca}
.wrap{padding:6px 7px 10px}
.summary{display:none}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:6px;text-align:center;box-shadow:var(--shadow)}
.kpi b{display:block;font-size:20px}
.kpi span{font-size:13px;color:var(--muted);font-weight:700}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:7px;margin:0 0 6px;}
.cardTop{display:flex;justify-content:space-between;gap:6px;align-items:flex-start}
.brand{display:inline-flex;align-items:center;gap:5px;background:#e0f2fe;color:#075985;border:1px solid #bae6fd;border-radius:999px;padding:3px 8px;font-weight:900;font-size:12px;letter-spacing:.2px}
.measure{font-size:22px;font-weight:900;margin:3px 0 1px;line-height:1}
.model{font-size:13px;font-weight:800;color:#374151;line-height:1.08;max-height:29px;overflow:hidden}
.badges{text-align:right;min-width:72px}
.stock{display:inline-block;background:#f3f4f6;border:1px solid var(--line);border-radius:999px;padding:4px 7px;font-weight:900;font-size:12px;color:#374151}
.rin{display:block;margin-top:4px;color:var(--muted);font-size:12px;font-weight:900}
.pricegrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:6px}
.price{border:1px solid var(--line);border-radius:10px;padding:4px;background:#f9fafb;text-align:center}
.price span{display:block;font-size:10px;color:var(--muted);font-weight:900;text-transform:uppercase}
.price b{display:block;font-size:16px;margin-top:1px}
.price.sale b{color:var(--good)}
.cardActions{display:flex;gap:6px;margin-top:6px}
.action{flex:1;border:0;background:#eef2ff;color:#3730a3;border-radius:10px;height:28px;font-size:13px;font-weight:900}
.action.alt{background:#fff7ed;color:#9a3412}
.details{display:none;border-top:1px solid var(--line);margin-top:12px;padding-top:10px;color:#374151;font-size:15px;line-height:1.45}
.details.open{display:block}
.detailGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field{background:#f9fafb;border:1px solid var(--line);border-radius:12px;padding:8px}
.field small{display:block;color:var(--muted);font-weight:800;text-transform:uppercase;font-size:11px}
.adminFields{display:none;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.admin .adminFields{display:grid}
.adminFields label{display:block;background:#f9fafb;border:1px solid var(--line);border-radius:12px;padding:8px;font-size:12px;font-weight:800;color:var(--muted)}
.adminFields input{width:100%;height:40px;margin-top:4px;border:1px solid #d1d5db;border-radius:10px;padding:4px 8px;font-size:17px;color:#111827;font-weight:800}
.empty{padding:34px 18px;background:#fff;border-radius:18px;border:1px dashed #cbd5e1;text-align:center;color:#475569;font-weight:800}
.footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);padding:6px 8px 8px;display:none;gap:8px;z-index:20}.admin .footer{display:flex}
.footer button{flex:1;height:38px;border:0;border-radius:12px;background:var(--brand);color:#fff;font-weight:900;font-size:14px}
.footer button.secondary{background:#111827}
.toast{position:fixed;left:50%;bottom:82px;transform:translateX(-50%);background:#111827;color:white;padding:12px 16px;border-radius:999px;font-size:15px;font-weight:800;display:none;z-index:50}
@media (min-width:700px){.wrap{max-width:780px;margin:auto}.header>div{max-width:780px;margin-left:auto;margin-right:auto}}
</style>
</head>

function money(v){ return '$' + (Number(v||0)).toFixed(2); }
function norm(s){ return String(s||'').toUpperCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^A-Z0-9]/g,''); }
function tireDigits(s){ return String(s||'').replace(/\D/g,''); }
function keyFor(x){ return norm([x.marca,x.medida,x.modelo,x.indice,x.codigo,x.tipo,'RIN'+(x.rin||'')].join(' ')); }
function loadData(){
  try{ const saved = localStorage.getItem(STORAGE_KEY); if(saved) return JSON.parse(saved); }catch(e){}
  return JSON.parse(JSON.stringify(BASE_DATA));
}
function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); showToast('Guardado'); }
function showToast(msg){ const t=$('#toast'); t.textContent=msg; t.style.display='block'; clearTimeout(window._toast); window._toast=setTimeout(()=>t.style.display='none',1300); }
function populateFilters(){
  const brands = [...new Set(data.map(x=>x.marca))].sort();
  $('#brandFilter').innerHTML = '<option value="">Marcas</option>' + brands.map(b=>`<option>${b}</option>`).join('');
  const rins = [...new Set(data.map(x=>x.rin).filter(Boolean))].sort((a,b)=>a-b);
  $('#rinFilter').innerHTML = '<option value="">Rines</option>' + rins.map(r=>`<option value="${r}">Rin ${r}</option>`).join('');
}
function matches(x, query){
  if(!query) return true;
  const hay = keyFor(x);
  const medidaDigits = tireDigits(x.medida);
  const medidaNorm = norm(x.medida);
  const raw = String(query || '').trim();
  const fullNorm = norm(raw);
  const fullDigits = tireDigits(raw);
  if(hay.includes(fullNorm)) return true;
  if(fullDigits.length >= 4 && medidaDigits.includes(fullDigits)) return true;
  const rin = raw.match(/^\s*(?:RIN|ARO|R)\s*(\d{2})\s*$/i);
  if(rin && Number(rin[1]) === Number(x.rin)) return true;
  const tokens = raw.toUpperCase().split(/\s+/).filter(Boolean);
  return tokens.every(tok => {
    const nt = norm(tok);
    const dt = tireDigits(tok);
    if(!nt) return true;
    if(hay.includes(nt)) return true;
    if(dt.length >= 4 && medidaDigits.includes(dt)) return true;
    if(medidaNorm.includes(nt)) return true;
    return false;
  });
}
function filtered(){
  const brand=$('#brandFilter').value;
  const rin=$('#rinFilter').value;
  const query=q.value.trim();
  return data.filter(x => (!brand || x.marca===brand) && (!rin || String(x.rin)===String(rin)) && (!onlyStock || Number(x.stock)>0) && matches(x, query));
}

  let s=String(size||'').toUpperCase().replace(/^P|^LT/,'').replace(/C$/,'');
  let m=s.match(/(\d{3})\/(\d{2})R(\d{2})/);
  if(m){ let w=+m[1], ar=+m[2], r=+m[3]; return r*25.4 + 2*w*ar/100; }
  return null;
}
function alternatives(item){
  const d=parseDiameter(item.medida); if(!d) return [];
  return data.filter(x => x.id!==item.id && x.rin===item.rin && parseDiameter(x.medida) && Math.abs(parseDiameter(x.medida)-d)/d <= 0.03)
    .slice(0,8);
}
function card(x){
  const st = x.stock === null || x.stock === undefined || x.stock === '' ? '—' : x.stock;
  return `<article class="card" data-id="${x.id}">
    <div class="cardTop">
      <div>
        <span class="brand">${x.marca}</span>
        <div class="measure">${x.medida}</div>
        <div class="model">${x.modelo || 'Sin modelo'} ${x.indice ? ' · '+x.indice : ''}</div>
      </div>
      <div class="badges"><span class="stock">Stock: ${st}</span><span class="rin">${x.rin ? 'Rin '+x.rin : ''}</span></div>
    </div>
    <div class="pricegrid">
      <div class="price"><span>Costo</span><b>${money(x.costo)}</b></div>
      <div class="price sale"><span>Público 1</span><b>${money(x.publico1)}</b></div>
      <div class="price sale"><span>Público 2</span><b>${money(x.publico2)}</b></div>
    </div>
    <div class="adminFields">
      <label>Costo<input data-field="costo" type="number" step="0.01" value="${Number(x.costo).toFixed(2)}"></label>
      <label>Público 1<input data-field="publico1" type="number" step="0.01" value="${Number(x.publico1).toFixed(2)}"></label>
      <label>Público 2<input data-field="publico2" type="number" step="0.01" value="${Number(x.publico2).toFixed(2)}"></label>
      <label>Stock<input data-field="stock" type="number" step="1" value="${x.stock ?? ''}"></label>
    </div>
    <div class="cardActions">
      <button class="action" data-action="details">Detalles</button>
      <button class="action alt" data-action="alts">Alternativas</button>
    </div>
    <div class="details"></div>
  </article>`;
}
function render(){
  document.body.classList.toggle('admin', admin);
  const rows=filtered();
  const shownEl=$('#shown'), totalEl=$('#total');
  if(shownEl) shownEl.textContent=rows.length;
  if(totalEl) totalEl.textContent=data.length;
  const kb=$('#kpiBrands'), ki=$('#kpiItems'), ks=$('#kpiStock');
  if(kb) kb.textContent=new Set(data.map(x=>x.marca)).size;
  if(ki) ki.textContent=data.length;
  if(ks) ks.textContent=data.reduce((s,x)=>s+(Number(x.stock)||0),0);
  if(rows.length===0){ list.innerHTML='<div class="empty">No encontré resultados. Prueba: 1856515, rin15, CORDIAL, BOTO.</div>'; return; }
  list.innerHTML=rows.map(card).join('');
}
function detailsHTML(x){
  return `<div class="detailGrid">
    <div class="field"><small>Código</small>${x.codigo || '—'}</div>
    <div class="field"><small>Índice</small>${x.indice || '—'}</div>
    <div class="field"><small>Modelo</small>${x.modelo || '—'}</div>
    <div class="field"><small>Rin</small>${x.rin || '—'}</div>
  </div>`;
}
function altsHTML(x){
  const alts=alternatives(x);
  if(!alts.length) return '<b>No hay alternativas aproximadas por diámetro para esta medida.</b>';
  return '<b>Alternativas aproximadas:</b><br>' + alts.map(a => `${a.marca} · ${a.medida} · ${a.modelo} · Pub1 ${money(a.publico1)}`).join('<br>');
}
list.addEventListener('click', e => {
  const btn=e.target.closest('button'); if(!btn) return;
  const cardEl=e.target.closest('.card'); const id=cardEl.dataset.id; const x=data.find(i=>i.id===id); const box=cardEl.querySelector('.details');
  if(btn.dataset.action==='details'){ box.innerHTML=detailsHTML(x); box.classList.toggle('open'); }
  if(btn.dataset.action==='alts'){ box.innerHTML=altsHTML(x); box.classList.toggle('open'); }
});
list.addEventListener('change', e => {
  const inp=e.target.closest('input[data-field]'); if(!inp) return;
  const id=e.target.closest('.card').dataset.id; const x=data.find(i=>i.id===id); const f=inp.dataset.field;
  let val = inp.value === '' ? null : Number(inp.value);
  x[f]=val; saveData(); render();
});
['input','change'].forEach(ev=>q.addEventListener(ev,render));
q.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); render(); q.blur(); }});
$('#searchBtn').onclick=()=>{ render(); q.blur(); };
$('#clearBtn').onclick=()=>{ q.value=''; $('#brandFilter').value=''; $('#rinFilter').value=''; onlyStock=false; $('#stockBtn').textContent='Stock'; render(); };
$('#brandFilter').onchange=render; $('#rinFilter').onchange=render;
$('#stockBtn').onclick=()=>{ onlyStock=!onlyStock; $('#stockBtn').textContent=onlyStock?'Todos':'Stock'; render(); };
$('#adminBtn').onclick=()=>{ admin=!admin; $('#adminBtn').textContent=admin?'Admin ON':'Admin'; render(); };
$('#topBtn').onclick=()=>scrollTo({top:0,behavior:'smooth'});
$('#resetBtn').onclick=()=>{ if(confirm('¿Restaurar base original? Se perderán cambios guardados.')){ localStorage.removeItem(STORAGE_KEY); data=JSON.parse(JSON.stringify(BASE_DATA)); populateFilters(); render(); showToast('Base restaurada'); } };
$('#exportBtn').onclick=()=>download('respaldo_inventario_llantas.json', JSON.stringify(data,null,2), 'application/json');
$('#csvBtn').onclick=()=>{
  const cols=['marca','medida','modelo','indice','codigo','rin','stock','costo','publico1','publico2'];
  const csv=[cols.join(',')].concat(data.map(x=>cols.map(c=>`"${String(x[c] ?? '').replace(/"/g,'""')}"`).join(','))).join('\n');
  download('inventario_llantas.csv', csv, 'text/csv;charset=utf-8');
};
$('#importBtn').onclick=()=>$('#importFile').click();
$('#importFile').onchange=(ev)=>{
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=()=>{ try{ data=JSON.parse(r.result); saveData(); populateFilters(); render(); showToast('Respaldo cargado'); }catch(e){ alert('Archivo JSON no válido'); } }; r.readAsText(f);
};
function download(name, text, type){ const blob=new Blob([text],{type}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); URL.revokeObjectURL(a.href); }
populateFilters(); render();
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./service-worker.js").catch(function (err) {
      console.log("Service worker no registrado:", err);
    });
  });
}
</script>
